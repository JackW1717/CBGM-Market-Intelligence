name: Daily news update

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          echo "Running on SHA: $GITHUB_SHA"
          if [ -f package-lock.json ]; then
            echo "Install mode: npm ci (lockfile detected)"
            npm ci
          else
            echo "Install mode: npm install (no lockfile found)"
            npm install
          fi
      - run: npm run validate:data
      - run: npm run fetch:news
      - run: npm run validate:data

      - name: Upload fetch diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: fetch-status
          path: data/fetch-status.json

      - name: Create PR with updates if changed
        run: |
          # Only create a commit when the curated article store changes.
          # `data/fetch-status.json` is expected to change every run.
          if git diff --quiet -- data/articles.json; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git commit -m "chore: daily market intelligence feed refresh"
      - name: Open or update bot PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/daily-news-update
          title: "chore: daily market intelligence feed refresh"
          body: |
            Automated daily update of `data/articles.json` from public feeds.
            - Generated by `daily-news-update.yml`
            - Includes latest curated additions only
          commit-message: "chore: daily market intelligence feed refresh"
